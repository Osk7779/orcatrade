name: codeql

# Phase 0 task P0.D of docs/execution-plan.md. See ADR 0011.
#
# Static application security testing (SAST) for JavaScript + TypeScript.
# Uses GitHub's native CodeQL with the "security-and-quality" query suite —
# catches known vulnerability patterns (SQL injection, command injection,
# path traversal, prototype pollution, etc.) and code-quality smells
# adjacent to security (dead code that could become live, exception
# swallowing, etc.).
#
# Runs on every PR + push to main + weekly schedule so dormant findings
# in untouched files still get a fresh scan when CodeQL's query set
# updates.
#
# Free for private repos at OrcaTrade's scale. No external account
# required; uses the default GITHUB_TOKEN with security-events: write.
# Results land in the repo's Security → Code scanning tab.

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  schedule:
    # Weekly full scan — catches new CodeQL queries against unchanged files.
    # Monday 03:17 UTC: off-peak; not on the hour to spread load against
    # GitHub's actions runners.
    - cron: '17 3 * * 1'

permissions:
  actions: read
  contents: read
  security-events: write
  packages: read

jobs:
  analyse:
    name: analyse (${{ matrix.language }})
    runs-on: ubuntu-latest
    timeout-minutes: 30

    strategy:
      fail-fast: false
      matrix:
        language: [javascript-typescript]

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Initialise CodeQL
        uses: github/codeql-action/init@v4
        with:
          languages: ${{ matrix.language }}
          # security-and-quality is the strongest default. If false-positive
          # noise becomes a problem, swap to "security-extended" or
          # "security-and-quality" with a path filter.
          queries: security-and-quality

      - name: Auto-build
        uses: github/codeql-action/autobuild@v4

      - name: Run CodeQL analysis
        uses: github/codeql-action/analyze@v4
        with:
          category: '/language:${{ matrix.language }}'
