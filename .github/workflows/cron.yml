name: cron

# Scheduled jobs that fire against the production /api/cron endpoint.
# Vercel Hobby doesn't ship Vercel Cron, so we drive everything from GHA.
#
# Each job is a small curl-and-assert step. The cron handler is
# idempotent (the digest is a snapshot, plan-revision emails dedupe per
# ISO week per plan), so duplicate runs are safe.
#
# Required repo secrets:
#   CRON_TOKEN  — must match ORCATRADE_CRON_TOKEN on Vercel
#   SITE_ORIGIN — e.g. https://orcatrade.pl
#
# Manual triggers also work via the "Run workflow" button in the Actions
# tab — useful for testing without waiting for the schedule.

on:
  schedule:
    # Monday 06:30 UTC — founder digest
    - cron: '30 6 * * 1'
    # Monday 07:30 UTC — compliance deadline reminders (Sprint
    # compliance-calendar-v1 phase 3). Own slot between the founder digest
    # and the weekly user digest; 6-day handler dedupe prevents spam.
    - cron: '30 7 * * 1'
    # Monday 09:00 UTC — weekly-user-digest (Sprint weekly-digest-v1).
    # Per-user idempotency in the handler (6-day window) makes this safe
    # to re-fire; the 09:00 slot avoids stepping on the 06:30 founder run.
    - cron: '0 9 * * 1'
    # Tuesday + Friday 08:00 UTC — plan-revision email scan
    # (twice a week is enough; per-week dedupe in the handler prevents spam)
    - cron: '0 8 * * 2,5'
    # Thursday 08:30 UTC — portfolio cost-drift scan (Sprint
    # portfolio-revision-v1). Weekly is enough; 6-day handler dedupe
    # prevents spam. Own slot so the multi-portfolio recompute load
    # doesn't pile onto the plan-revision run.
    - cron: '30 8 * * 4'
    # Wednesday 05:00 UTC — EUR-Lex regime drift check
    # (weekly is enough — these regulations change quarterly at most)
    - cron: '0 5 * * 3'
    # Daily 03:00 UTC — calibration drift check (Sprint BG-1.7).
    # Reads actuals via PG, emits one Sentry warn per group crossing the
    # drift threshold, writes the snapshot KV key /dashboard/calibration/
    # reads for its "current alerts" pane. Lives before TARIC warm so an
    # alert lands before the next round of users hits the calculators.
    - cron: '0 3 * * *'
    # Daily 04:15 UTC — TARIC cache warmer (Sprint F).
    # Keeps the curated 30-entry HS×origin cache fresh so the first
    # real user with one of these codes sees an instant response.
    - cron: '15 4 * * *'
    # Sunday 06:00 UTC — sanctions consolidated-list refresh (Sprint
    # sanctions-lists-v1). Re-fetches the official list into Postgres;
    # weekly is enough (lists update on business days, screening falls
    # back to the bundled sample if a refresh is missed).
    - cron: '0 6 * * 0'
  workflow_dispatch:
    inputs:
      job:
        description: 'Job to run'
        required: true
        type: choice
        options:
          - founder-digest
          - weekly-user-digest
          - plan-revision-emails
          - portfolio-revision-emails
          - compliance-deadline-reminders
          - regime-change-check
          - calibration-drift-check
          - taric-warm
          - sanctions-refresh
          - db-migrate

jobs:
  dispatch:
    runs-on: ubuntu-latest
    steps:
      - name: Resolve which job to run
        id: which
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "job=${{ github.event.inputs.job }}" >> "$GITHUB_OUTPUT"
          elif [ "${{ github.event.schedule }}" = "30 6 * * 1" ]; then
            echo "job=founder-digest" >> "$GITHUB_OUTPUT"
          elif [ "${{ github.event.schedule }}" = "0 9 * * 1" ]; then
            echo "job=weekly-user-digest" >> "$GITHUB_OUTPUT"
          elif [ "${{ github.event.schedule }}" = "0 8 * * 2,5" ]; then
            echo "job=plan-revision-emails" >> "$GITHUB_OUTPUT"
          elif [ "${{ github.event.schedule }}" = "30 8 * * 4" ]; then
            echo "job=portfolio-revision-emails" >> "$GITHUB_OUTPUT"
          elif [ "${{ github.event.schedule }}" = "30 7 * * 1" ]; then
            echo "job=compliance-deadline-reminders" >> "$GITHUB_OUTPUT"
          elif [ "${{ github.event.schedule }}" = "0 5 * * 3" ]; then
            echo "job=regime-change-check" >> "$GITHUB_OUTPUT"
          elif [ "${{ github.event.schedule }}" = "0 3 * * *" ]; then
            echo "job=calibration-drift-check" >> "$GITHUB_OUTPUT"
          elif [ "${{ github.event.schedule }}" = "15 4 * * *" ]; then
            echo "job=taric-warm" >> "$GITHUB_OUTPUT"
          elif [ "${{ github.event.schedule }}" = "0 6 * * 0" ]; then
            echo "job=sanctions-refresh" >> "$GITHUB_OUTPUT"
          else
            echo "Unknown trigger" && exit 1
          fi

      - name: Fire ${{ steps.which.outputs.job }}
        env:
          CRON_TOKEN: ${{ secrets.CRON_TOKEN }}
          SITE_ORIGIN: ${{ secrets.SITE_ORIGIN }}
          JOB: ${{ steps.which.outputs.job }}
        run: |
          if [ -z "$CRON_TOKEN" ] || [ -z "$SITE_ORIGIN" ]; then
            echo "Missing CRON_TOKEN or SITE_ORIGIN secret"
            exit 1
          fi
          STATUS_FILE=$(mktemp)
          BODY_FILE=$(mktemp)
          HTTP_CODE=$(curl -sS \
            -o "$BODY_FILE" \
            -w "%{http_code}" \
            -X POST \
            -H "Content-Type: application/json" \
            -H "X-Cron-Token: $CRON_TOKEN" \
            -d "{\"job\":\"$JOB\"}" \
            "$SITE_ORIGIN/api/cron")
          echo "HTTP $HTTP_CODE"
          echo "--- response body ---"
          cat "$BODY_FILE"
          echo ""
          echo "--- end body ---"
          if [ "$HTTP_CODE" != "200" ]; then
            echo "Cron call failed"
            exit 1
          fi
