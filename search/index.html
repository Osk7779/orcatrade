<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Orcatrade — Factory Search</title>
    <meta name="description" content="Find verified Chinese factories with EU export experience. Powered by Orcatrade." />

    <!-- Fonts: Cormorant Garant (headings) + Geist (body/ui) -->
    <link rel="preconnect" href="https://fonts.googleapis.com"/>
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garant:ital,wght@0,300;0,400;0,500;0,600;0,700;1,400;1,500&display=swap" rel="stylesheet"/>
    <link href="https://cdn.jsdelivr.net/npm/geist@1.3.0/dist/fonts/geist-sans/style.css" rel="stylesheet"/>

    <!--
    ╔══════════════════════════════════════════════════════════════════╗
    ║              ORCATRADE FACTORY SEARCH — INTEGRATION             ║
    ╠══════════════════════════════════════════════════════════════════╣
    ║                                                                  ║
    ║  OPTION 1 — iframe embed (any page on orcatrade.pl)             ║
    ║  ──────────────────────────────────────────────────             ║
    ║  <iframe                                                         ║
    ║    src="https://search.orcatrade.pl"                            ║
    ║    width="100%"                                                  ║
    ║    height="800"                                                  ║
    ║    frameborder="0"                                               ║
    ║    style="border:none;"                                          ║
    ║  ></iframe>                                                      ║
    ║                                                                  ║
    ║  OPTION 2 — direct link / button on orcatrade.pl                ║
    ║  ─────────────────────────────────────────────────              ║
    ║  <a href="https://orcatrade.pl/search"                          ║
    ║     target="_blank">Find a Factory</a>                           ║
    ║                                                                  ║
    ║  OPTION 3 — React component import (same React app)             ║
    ║  ──────────────────────────────────────────────────             ║
    ║  import App from './orcatrade-search/src/App.jsx';              ║
    ║  then render <App /> wherever needed.                            ║
    ║                                                                  ║
    ╚══════════════════════════════════════════════════════════════════╝
    -->
    <script type="module" crossorigin src="/search/assets/index-CUmIM3WQ.js"></script>
    <link rel="stylesheet" crossorigin href="/search/assets/index-Cn-Ki8KK.css">

  <!-- hreflang block injected by inject-hreflang.js -->
  <link rel="alternate" hreflang="en" href="https://www.orcatrade.pl/search/" />
  <link rel="alternate" hreflang="pl" href="https://www.orcatrade.pl/pl/search/" />
  <link rel="alternate" hreflang="de" href="https://www.orcatrade.pl/de/search/" />
  <link rel="alternate" hreflang="x-default" href="https://www.orcatrade.pl/search/" />


  <!-- favicon set v5 injected by scripts/inject-favicon-tags.js -->
  <link rel="icon" type="image/png" sizes="192x192" href="/icons/orca-192.png" />
  <link rel="icon" type="image/png" sizes="512x512" href="/icons/orca-512.png" />
  <link rel="icon" type="image/png" sizes="48x48" href="/icons/orca-48.png" />
  <link rel="icon" type="image/png" sizes="32x32" href="/icons/orca-32.png" />
  <link rel="icon" type="image/png" sizes="16x16" href="/icons/orca-16.png" />
  <link rel="icon" href="/icons/orca.ico" sizes="any" />
  <link rel="shortcut icon" href="/icons/orca.ico" />
  <link rel="apple-touch-icon" sizes="180x180" href="/icons/orca-apple.png" />
  <link rel="manifest" href="/site.webmanifest" />
  <meta name="theme-color" content="#0a1628" />
  <script>
    /* v5 defensive favicon: re-inject the icon link at runtime so the
       browser can't reuse a stale "no favicon for this URL" decision
       from before the icons were added. */
    (function () {
      try {
        var existing = document.querySelectorAll('link[rel~="icon"]');
        existing.forEach(function (el) { el.parentNode && el.parentNode.removeChild(el); });
        var sizes = [
          ['192x192', '/icons/orca-192.png'],
          ['512x512', '/icons/orca-512.png'],
          ['48x48',   '/icons/orca-48.png'],
          ['32x32',   '/icons/orca-32.png'],
          ['16x16',   '/icons/orca-16.png'],
        ];
        sizes.forEach(function (s) {
          var l = document.createElement('link');
          l.rel = 'icon'; l.type = 'image/png'; l.sizes = s[0]; l.href = s[1];
          document.head.appendChild(l);
        });
        var ico = document.createElement('link');
        ico.rel = 'icon'; ico.href = '/icons/orca.ico';
        document.head.appendChild(ico);
        var apple = document.createElement('link');
        apple.rel = 'apple-touch-icon'; apple.setAttribute('sizes', '180x180');
        apple.href = '/icons/orca-apple.png';
        document.head.appendChild(apple);
      } catch (e) {}
    })();
  </script>
</head>
  <style>
    .search-back-bar {
      position: fixed;
      top: 0; left: 0; right: 0;
      z-index: 9999;
      background: rgba(5,5,7,0.92);
      backdrop-filter: blur(12px);
      border-bottom: 1px solid rgba(255,255,255,0.07);
      padding: 0.7rem 1.5rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .search-back-link {
      font-family: 'Geist', sans-serif;
      font-size: 0.76rem;
      font-weight: 500;
      text-transform: uppercase;
      letter-spacing: 0.16em;
      color: rgba(255,255,255,0.5);
      text-decoration: none;
      transition: color 0.18s;
    }
    .search-back-link:hover { color: #fff; }
    .search-back-brand {
      font-family: 'Cormorant Garant', Georgia, serif;
      font-size: 0.9rem;
      font-weight: 500;
      color: #ececec;
      letter-spacing: 0.06em;
    }
    .search-back-badge {
      font-family: 'Geist', sans-serif;
      font-size: 0.62rem;
      font-weight: 600;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      padding: 0.2rem 0.55rem;
      border-radius: 0;
      border: 1px solid rgba(184,190,200,0.3);
      color: rgba(184,190,200,0.8);
    }
    #root { padding-top: 44px; }
  </style>
  <body>
    <div class="search-back-bar">
      <a href="/" class="search-back-link">← Back to OrcaTrade Group</a>
      <span class="search-back-brand">ORCATRADE GROUP</span>
      <span class="search-back-badge">Beta</span>
    </div>
    <div id="root"></div>
  </body>
</html>
