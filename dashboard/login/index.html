<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Sign in — OrcaTrade Dashboard</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="robots" content="noindex" />
  <meta name="description" content="Sign in to your OrcaTrade workspace.">
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garant:wght@400;500;600;700&display=swap" rel="stylesheet"/>
  <link href="https://cdn.jsdelivr.net/npm/geist@1.3.0/dist/fonts/geist-sans/style.css" rel="stylesheet"/>
  <link rel="stylesheet" href="../../css/styles.css">
  <style>
    .auth-shell { max-width: 460px; margin: 4rem auto; padding: 0 1.5rem; position: relative; z-index: 1; }
    .auth-card { background: #0d0f14; border: 1px solid rgba(255,255,255,0.08); padding: 2.6rem 2.4rem; }
    .auth-card h1 { font-family: 'Cormorant Garant', Georgia, serif; font-size: 1.8rem; font-weight: 600; letter-spacing: -0.01em; margin-bottom: 0.4rem; color: rgba(255,255,255,0.97); }
    .auth-card .sub { font-size: 0.9rem; color: rgba(255,255,255,0.6); line-height: 1.6; margin-bottom: 1.8rem; }
    .auth-form { display: grid; gap: 1rem; }
    .auth-form label { font-size: 0.7rem; font-weight: 600; letter-spacing: 0.14em; text-transform: uppercase; color: rgba(255,255,255,0.55); margin-bottom: 0.3rem; display: block; }
    .auth-form input { width: 100%; background: rgba(255,255,255,0.04); border: 1px solid rgba(255,255,255,0.12); color: rgba(255,255,255,0.95); padding: 0.7rem 0.9rem; font-family: inherit; font-size: 0.92rem; border-radius: 2px; }
    .auth-form input:focus { outline: none; border-color: var(--accent-color, #b8bec8); background: rgba(255,255,255,0.07); }
    .auth-btn { padding: 0.85rem 1rem; background: var(--accent-color, #b8bec8); color: #0a0912; border: none; font-family: inherit; font-size: 0.82rem; font-weight: 700; letter-spacing: 0.1em; text-transform: uppercase; cursor: pointer; border-radius: 2px; }
    .auth-btn:hover { filter: brightness(1.08); transform: translateY(-1px); }
    .auth-msg { font-size: 0.84rem; color: #c95050; min-height: 1.2em; line-height: 1.5; }
    .auth-meta { margin-top: 1.6rem; padding-top: 1.4rem; border-top: 1px solid rgba(255,255,255,0.08); font-size: 0.84rem; color: rgba(255,255,255,0.65); line-height: 1.65; }
    .auth-meta a { color: var(--accent-color, #b8bec8); border-bottom: 1px dotted rgba(184,190,200,0.4); text-decoration: none; }
    .auth-stub-banner { padding: 0.8rem 1rem; background: rgba(201,162,86,0.08); border-left: 2px solid #c9a256; font-size: 0.78rem; line-height: 1.55; color: rgba(255,255,255,0.85); margin-bottom: 1.6rem; }
    .auth-stub-banner b { color: #c9a256; }
  </style>


  <!-- favicon set v3 injected by scripts/inject-favicon-tags.js -->
  <link rel="icon" type="image/png" sizes="192x192" href="/favicon-192x192.png" />
  <link rel="icon" type="image/png" sizes="512x512" href="/favicon-512x512.png" />
  <link rel="icon" type="image/png" sizes="48x48" href="/favicon-48x48.png" />
  <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png" />
  <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png" />
  <link rel="icon" href="/favicon.ico" sizes="any" />
  <link rel="shortcut icon" href="/favicon.ico" />
  <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png" />
  <link rel="manifest" href="/site.webmanifest" />
  <meta name="theme-color" content="#0a1628" />
</head>
<body>
  <div class="aurora" aria-hidden="true"><div class="aurora-blob b1"></div><div class="aurora-blob b2"></div><div class="aurora-blob b3"></div></div>

  <div class="page">
    <main>
      <div class="auth-shell">
        <a href="../../index.html" style="font-size: 0.78rem; letter-spacing: 0.14em; text-transform: uppercase; color: rgba(255,255,255,0.55); text-decoration: none; display: inline-block; margin-bottom: 1.6rem;">← OrcaTrade</a>

        <div class="auth-card">
          <h1>Sign in</h1>
          <p class="sub">Welcome back. Sign in to your workspace.</p>

          <div class="auth-stub-banner">
            <b>Demo mode:</b> stub authentication backed by browser storage. Real auth (Supabase / Auth.js / Clerk) is wired in the next sprint. Any email + name combination logs you in.
          </div>

          <form id="login-form" class="auth-form">
            <div>
              <label for="email">Email</label>
              <input id="email" name="email" type="email" required placeholder="you@company.com" autofocus />
            </div>
            <div>
              <label for="name">Name</label>
              <input id="name" name="name" type="text" required placeholder="Your full name" />
            </div>
            <div class="auth-msg" id="auth-msg"></div>
            <button class="auth-btn" type="submit">Sign in</button>
          </form>

          <div class="auth-meta">
            New to OrcaTrade? <a href="../signup/">Create a workspace</a>
          </div>
        </div>
      </div>
    </main>
  </div>

  <script src="../auth.js"></script>
  <script>
    document.getElementById('login-form').addEventListener('submit', e => {
      e.preventDefault();
      const email = document.getElementById('email').value.trim();
      const name = document.getElementById('name').value.trim();
      const msg = document.getElementById('auth-msg');
      const result = window.OrcaAuth.signIn({ email, name });
      if (!result.ok) { msg.textContent = result.error; return; }
      window.location.href = '../';
    });
  </script>
</body>
</html>
